name: Debug

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - name: Build debug APK
        env:
          LUMO_AI_ENDPOINT: ${{ vars.LUMO_AI_ENDPOINT }}
        run: |
          version="$(sed -n 's/^version: \([^+]*\).*/\1/p' pubspec.yaml)"
          flutter build apk --debug --dart-define=LUMO_AI_ENDPOINT="$LUMO_AI_ENDPOINT" --dart-define=APP_VERSION="$version"
      - uses: actions/upload-artifact@v4
        with:
          name: lumo-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

name: Bootstrap quality files

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format lib test
      - uses: actions/upload-artifact@v7
        with:
          name: quality-bootstrap
          path: |
            pubspec.lock
            lib
            test
          retention-days: 1

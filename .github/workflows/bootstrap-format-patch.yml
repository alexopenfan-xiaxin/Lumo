name: Bootstrap format patch

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart format lib test
      - run: git diff --binary -- lib test > formatting.patch
      - uses: actions/upload-artifact@v7
        with:
          name: lumo-format-patch
          path: formatting.patch
          if-no-files-found: error
          retention-days: 1

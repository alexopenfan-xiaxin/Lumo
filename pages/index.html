<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lumo 邀请码</title>
  <style>
    :root { color-scheme: dark; --night:#111827; --deep:#18233b; --mist:#e8edf7; --soft:#aab6ce; --moon:#d8b66a; --line:#33405b; --error:#ffb4ab; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; color:var(--mist); background:radial-gradient(circle at 75% 15%,#2a3b63 0,transparent 34%),linear-gradient(145deg,var(--night),#0b1020); font-family:"Microsoft YaHei UI","PingFang SC",sans-serif; }
    main { width:min(100%,480px); position:relative; }
    .brand { margin:0 0 36px; display:flex; align-items:center; gap:14px; }
    .mark { width:44px; height:44px; display:grid; place-items:center; border:1px solid var(--moon); border-radius:50%; color:var(--moon); font:25px Georgia,serif; box-shadow:0 0 36px #d8b66a33; }
    .brand h1 { margin:0; font:500 28px "STKaiti","KaiTi",serif; letter-spacing:.12em; }
    .brand p { margin:3px 0 0; color:var(--soft); font-size:12px; letter-spacing:.12em; }
    section { background:#18233be8; border:1px solid var(--line); border-radius:24px; padding:28px; box-shadow:0 24px 70px #05091488; backdrop-filter:blur(14px); }
    h2 { margin:0 0 8px; font:500 27px "STKaiti","KaiTi",serif; }
    .intro { margin:0 0 24px; color:var(--soft); line-height:1.7; }
    label { display:block; margin:16px 0 7px; color:var(--soft); font-size:13px; }
    input { width:100%; min-height:48px; border:1px solid var(--line); border-radius:12px; padding:0 14px; color:var(--mist); background:#0f172a; font:inherit; outline:none; }
    input:focus { border-color:var(--moon); box-shadow:0 0 0 3px #d8b66a22; }
    button { min-height:48px; border:0; border-radius:12px; padding:0 18px; color:var(--night); background:var(--moon); font:600 15px inherit; cursor:pointer; }
    button:focus-visible { outline:3px solid #fff; outline-offset:3px; }
    button:disabled { opacity:.55; cursor:wait; }
    form button { width:100%; margin-top:22px; }
    .error { min-height:22px; margin:12px 0 0; color:var(--error); font-size:13px; }
    .ticket { position:relative; margin:24px 0 18px; padding:24px 18px; overflow:hidden; border:1px solid #d8b66a66; border-radius:16px; text-align:center; background:linear-gradient(110deg,#202d49,#172139); }
    .ticket::before,.ticket::after { content:""; position:absolute; top:50%; width:18px; height:18px; border-radius:50%; background:#172139; border:1px solid var(--line); transform:translateY(-50%); }
    .ticket::before { left:-10px; } .ticket::after { right:-10px; }
    .ticket small { display:block; margin-bottom:9px; color:var(--soft); letter-spacing:.14em; }
    #code { color:var(--moon); font:600 clamp(20px,6vw,28px) ui-monospace,monospace; letter-spacing:.08em; }
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .secondary { color:var(--mist); background:transparent; border:1px solid var(--line); }
    .history { margin:24px 0 0; padding:18px 0 0; border-top:1px solid var(--line); }
    .history h3 { margin:0 0 10px; font-size:13px; color:var(--soft); font-weight:500; }
    .history ul { margin:0; padding:0; list-style:none; display:grid; gap:8px; }
    .history li { display:flex; justify-content:space-between; gap:12px; font:13px ui-monospace,monospace; }
    .used { color:var(--soft); }
    [hidden] { display:none !important; }
    @media (max-width:420px) { body{padding:16px} section{padding:22px 18px}.actions{grid-template-columns:1fr} }
    @media (prefers-reduced-motion:no-preference) { section { animation:arrive .35s ease-out both; } @keyframes arrive { from{opacity:0;transform:translateY(10px)} } }
  </style>
</head>
<body>
  <main>
    <header class="brand"><div class="mark" aria-hidden="true">◐</div><div><h1>Lumo</h1><p>INVITATION DESK</p></div></header>
    <section id="login-panel">
      <h2>管理员登录</h2>
      <p class="intro">使用你的 Lumo 账号验证身份后获取邀请码。</p>
      <form id="login-form">
        <label for="username">账号</label><input id="username" name="username" autocomplete="username" required>
        <label for="password">密码</label><input id="password" name="password" type="password" autocomplete="current-password" minlength="8" required>
        <button id="login-button" type="submit">登录并获取邀请码</button>
        <p id="login-error" class="error" role="alert"></p>
      </form>
    </section>
    <section id="invite-panel" hidden>
      <h2>一次性邀请码</h2>
      <p class="intro">每枚邀请码只能注册一个账号。</p>
      <div class="ticket"><small>LUMO ACCESS</small><div id="code" aria-live="polite">生成中…</div></div>
      <div class="actions"><button id="copy" type="button">复制邀请码</button><button id="generate" class="secondary" type="button">再生成一枚</button></div>
      <p id="invite-error" class="error" role="alert"></p>
      <div class="history"><h3>最近生成</h3><ul id="history"></ul></div>
    </section>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    let token = sessionStorage.getItem('lumo-admin-token');

    async function api(path, options = {}) {
      const response = await fetch(path, {headers:{'Content-Type':'application/json', ...(token ? {Authorization:`Bearer ${token}`} : {})}, ...options});
      const body = await response.json();
      if (!response.ok) throw new Error(body.error || '请求失败。');
      return body;
    }

    async function generate() {
      $('invite-error').textContent = '';
      $('generate').disabled = true;
      try {
        const {code} = await api('/admin/invites', {method:'POST'});
        $('code').textContent = code;
        await history();
      } catch (error) { $('invite-error').textContent = error.message; }
      finally { $('generate').disabled = false; }
    }

    async function history() {
      const {invites} = await api('/admin/invites');
      $('history').replaceChildren(...invites.slice(0, 8).map((invite) => {
        const item = document.createElement('li');
        item.innerHTML = `<span>${invite.code}</span><span class="used">${invite.used_at ? '已使用' : '未使用'}</span>`;
        return item;
      }));
    }

    $('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      $('login-error').textContent = '';
      $('login-button').disabled = true;
      try {
        const body = await api('/auth/login', {method:'POST', body:JSON.stringify({username:$('username').value, password:$('password').value})});
        if (body.role !== 'admin') throw new Error('该账号没有邀请码管理权限。');
        token = body.token;
        sessionStorage.setItem('lumo-admin-token', token);
        $('login-panel').hidden = true;
        $('invite-panel').hidden = false;
        await generate();
      } catch (error) { $('login-error').textContent = error.message; }
      finally { $('login-button').disabled = false; }
    });

    $('copy').addEventListener('click', async () => {
      await navigator.clipboard.writeText($('code').textContent);
      $('copy').textContent = '已复制';
      setTimeout(() => $('copy').textContent = '复制邀请码', 1200);
    });
    $('generate').addEventListener('click', generate);
  </script>
</body>
</html>
